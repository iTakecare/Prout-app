name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build client + serveur
        run: npm run build

      - name: Vérification de types (client)
        run: npm run typecheck -w client

      - name: Build de l'image Docker
        run: docker build -t prout-app:ci .
