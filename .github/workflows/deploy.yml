name: Déploiement VPS

# Déploiement de l'application sur le VPS, derrière le reverse proxy Traefik.
# L'image est construite sur GitHub puis transférée prête à l'emploi : le VPS
# se contente de la charger et de démarrer les conteneurs.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VPS_HOST: "76.13.0.189"
  VPS_USER: root
  DEPLOY_DIR: /opt/ITCmdm/deploy/prout-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t prout-app:latest .

      - name: Export de l'image
        run: docker save prout-app:latest | gzip > prout-app-image.tar.gz

      - name: Transfert vers le VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "prout-app-image.tar.gz,docker-compose.yml"
          target: ${{ env.DEPLOY_DIR }}

      - name: Démarrage de l'application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e
            cd "${{ env.DEPLOY_DIR }}"
            docker load -i prout-app-image.tar.gz
            rm -f prout-app-image.tar.gz
            [ -f .postgres_password ] || openssl rand -hex 24 > .postgres_password
            PROXY_NETWORK=$(docker network ls --format '{{.Name}}' | grep -Ei 'web|proxy|traefik' | head -1)
            cat > .env <<EOF
            APP_DOMAIN=prout-app.vibecodestudio.io
            POSTGRES_USER=prout
            POSTGRES_DB=prout
            POSTGRES_PASSWORD=$(cat .postgres_password)
            PROXY_NETWORK=${PROXY_NETWORK:-web}
            CERT_RESOLVER=le
            HTTPS_ENTRYPOINT=websecure
            EOF
            chmod 600 .env
            docker compose up -d --no-build --remove-orphans
            docker compose ps
