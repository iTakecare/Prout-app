name: Déploiement VPS

# Construit l'image sur GitHub, la transfère sur le VPS et démarre
# l'application derrière le reverse proxy Traefik. Le résultat est publié
# en commentaire de la PR #1 pour le suivi du déploiement.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  VPS_HOST: "76.13.0.189"
  VPS_USER: root
  DEPLOY_DIR: /opt/ITCmdm/deploy/prout-app
  SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=30"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t prout-app:latest .

      - name: Export de l'image
        run: docker save prout-app:latest | gzip > prout-app-image.tar.gz

      - name: Installer sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Déploiement sur le VPS
        id: deploy
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          T="$VPS_USER@$VPS_HOST"
          {
            echo "### Transfert de l'image vers le VPS"
            sshpass -e ssh $SSH_OPTS "$T" "mkdir -p $DEPLOY_DIR"
            sshpass -e scp $SSH_OPTS prout-app-image.tar.gz docker-compose.yml "$T:$DEPLOY_DIR/"
            echo "### Démarrage de l'application"
            sshpass -e ssh $SSH_OPTS "$T" 'bash -s' < scripts/start-on-vps.sh
          } 2>&1 | tee deploy-log.txt

      - name: Publier le résultat sur la PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -f deploy-log.txt ] || echo "(déploiement non démarré)" > deploy-log.txt
          {
            if [ "${{ steps.deploy.outcome }}" = "success" ]; then
              echo "## ✅ Déploiement réussi — run ${{ github.run_id }}"
              echo
              echo "Application en ligne : https://prout-app.vibecodestudio.io"
            else
              echo "## ❌ Déploiement en échec — run ${{ github.run_id }}"
            fi
            echo
            echo '```'
            tail -c 55000 deploy-log.txt
            echo '```'
          } > comment.md
          gh pr comment 1 --body-file comment.md --repo "${{ github.repository }}" || true
