name: Déploiement VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  VPS_HOST: "76.13.0.189"
  VPS_USER: root
  DEPLOY_DIR: /opt/ITCmdm/deploy/prout-app
  SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=30"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # L'image est construite ici, sur l'infrastructure GitHub (rapide).
      - name: Build de l'image Docker
        run: docker build -t prout-app:latest .

      - name: Export de l'image
        run: docker save prout-app:latest | gzip > prout-app-image.tar.gz

      - name: Installer sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Transfert vers le VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "===== TRANSFERT DES FICHIERS =====" >> vps-report.txt
          if sshpass -e ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" "mkdir -p $DEPLOY_DIR && echo 'Connexion OK'" >> vps-report.txt 2>&1; then
            sshpass -e scp $SSH_OPTS prout-app-image.tar.gz docker-compose.yml \
              "$VPS_USER@$VPS_HOST:$DEPLOY_DIR/" >> vps-report.txt 2>&1 \
              && echo "Transfert de l'image : OK" >> vps-report.txt \
              || echo "ECHEC: transfert de l'image" >> vps-report.txt
          else
            echo "ECHEC: connexion SSH au VPS" >> vps-report.txt
          fi

      - name: Diagnostic et déploiement sur le VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "===== EXÉCUTION DU DÉPLOIEMENT =====" >> vps-report.txt
          sshpass -e ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" 'bash -s' < scripts/vps-deploy.sh \
            >> vps-report.txt 2>&1 \
            || echo "(le script de déploiement s'est terminé en erreur)" >> vps-report.txt
          echo "----- RAPPORT COMPLET -----"
          cat vps-report.txt

      - name: Publier le rapport sur la PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -f vps-report.txt ] || echo "(aucun rapport généré)" > vps-report.txt
          {
            echo "## Rapport de déploiement VPS — run ${{ github.run_id }}"
            echo
            echo '```'
            tail -c 60000 vps-report.txt
            echo '```'
          } > comment.md
          gh pr comment 1 --body-file comment.md --repo "${{ github.repository }}" || true
