name: Déploiement VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VPS_HOST: "76.13.0.189"
  VPS_USER: root
  DEPLOY_DIR: /opt/ITCmdm/deploy/prout-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # L'image est construite ici, sur l'infrastructure GitHub (rapide),
      # et non sur le VPS — qui n'a qu'à la charger et la démarrer.
      - name: Build de l'image Docker
        run: docker build -t prout-app:latest .

      - name: Export de l'image
        run: docker save prout-app:latest | gzip > prout-app-image.tar.gz

      - name: Copier l'image et la configuration sur le VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "prout-app-image.tar.gz,docker-compose.yml"
          target: ${{ env.DEPLOY_DIR }}

      - name: Chargement et démarrage sur le VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e
            cd "${{ env.DEPLOY_DIR }}"

            echo "Chargement de l'image Docker..."
            docker load -i prout-app-image.tar.gz
            rm -f prout-app-image.tar.gz

            # Mot de passe PostgreSQL : généré une fois, stable ensuite.
            if [ ! -f .postgres_password ]; then
              (openssl rand -hex 24 2>/dev/null || date +%s%N | sha256sum | cut -c1-48) > .postgres_password
            fi
            PG_PASS="$(cat .postgres_password)"

            # Détection automatique de la configuration Traefik du VPS.
            TRAEFIK="$(docker ps --format '{{.Names}} {{.Image}}' | awk 'tolower($0) ~ /traefik/ {print $1; exit}')"
            PROXY_NETWORK=""
            if [ -n "$TRAEFIK" ]; then
              PROXY_NETWORK="$(docker inspect "$TRAEFIK" -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}' | grep -vE '^(bridge|host|none|)$' | head -1)"
            fi
            LABELS="$(docker ps -q | xargs -r docker inspect -f '{{json .Config.Labels}}' 2>/dev/null || true)"
            CERT_RESOLVER="$(printf '%s' "$LABELS" | grep -oE 'tls\.certresolver":"[^"]+' | head -1 | sed 's/.*"//')"
            HTTPS_ENTRYPOINT="$(printf '%s' "$LABELS" | grep -oE 'routers\.[^"]+\.entrypoints":"[^"]+' | head -1 | sed 's/.*"//')"
            PROXY_NETWORK="${PROXY_NETWORK:-web}"
            CERT_RESOLVER="${CERT_RESOLVER:-le}"
            HTTPS_ENTRYPOINT="${HTTPS_ENTRYPOINT:-websecure}"
            echo "Traefik -> reseau=$PROXY_NETWORK entrypoint=$HTTPS_ENTRYPOINT certresolver=$CERT_RESOLVER"

            cat > .env <<ENVEOF
            APP_DOMAIN=prout-app.vibecodestudio.io
            POSTGRES_USER=prout
            POSTGRES_DB=prout
            POSTGRES_PASSWORD=$PG_PASS
            PROXY_NETWORK=$PROXY_NETWORK
            CERT_RESOLVER=$CERT_RESOLVER
            HTTPS_ENTRYPOINT=$HTTPS_ENTRYPOINT
            ENVEOF
            chmod 600 .env

            docker compose up -d --no-build --remove-orphans
            docker image prune -f
            sleep 5
            echo "--- État des conteneurs ---"
            docker compose ps
            echo "--- Logs application ---"
            docker compose logs --tail=25 app
