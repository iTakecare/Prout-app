name: Diagnostic VPS

# Outil de diagnostic : se connecte au VPS et relève son état de santé.
# Chaque commande est bornée par un court délai, donc ce workflow se
# termine toujours rapidement, même si le serveur est très lent.

on:
  workflow_dispatch:

env:
  VPS_HOST: "76.13.0.189"
  VPS_USER: root

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Relevé de l'état du VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 10m
          script: |
            echo "=== 1. ESPACE DISQUE ==="
            timeout 20 df -h 2>&1 || echo "(df: bloque)"
            echo
            echo "=== 2. MEMOIRE ==="
            timeout 20 free -h 2>&1 || echo "(free: bloque)"
            echo
            echo "=== 3. CHARGE SYSTEME ==="
            timeout 20 uptime 2>&1 || echo "(uptime: bloque)"
            echo
            echo "=== 4. PROCESSUS LES PLUS GOURMANDS ==="
            timeout 20 sh -c 'ps aux --sort=-%mem | head -12' 2>&1 || echo "(ps: bloque)"
            echo
            echo "=== 5. SERVICE DOCKER ==="
            timeout 30 systemctl is-active docker 2>&1 || echo "(docker: inactif ou bloque)"
            timeout 30 sh -c 'systemctl status docker --no-pager | head -12' 2>&1 || echo "(status docker: bloque)"
            echo
            echo "=== 6. CONTENEURS EN COURS ==="
            timeout 45 docker ps --format '{{.Names}} | {{.Status}} | {{.Image}}' 2>&1 || echo "(docker ps: bloque - Docker ne repond pas)"
            echo
            echo "=== 7. ESPACE UTILISE PAR DOCKER ==="
            timeout 45 docker system df 2>&1 || echo "(docker system df: bloque)"
            echo
            echo "=== 8. DOSSIER DE DEPLOIEMENT ==="
            timeout 20 ls -lah /opt/ITCmdm/deploy/prout-app 2>&1 || echo "(ls: dossier absent ou bloque)"
            echo
            echo "=== DIAGNOSTIC TERMINE ==="
